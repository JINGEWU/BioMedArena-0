llm:
  # Any server/router that exposes the OpenAI chat-completions API.
  # Examples: vLLM, TGI, SGLang, Ollama, LM Studio, llama.cpp, Groq,
  # Together, Fireworks, HuggingFace Inference Providers, and xAI/Grok.
  provider: openai-compatible
  model: ${OPENAI_COMPATIBLE_MODEL}
  api_key: ${OPENAI_COMPATIBLE_API_KEY}
  base_url: ${OPENAI_COMPATIBLE_BASE_URL}

retrieval:
  omim_api_key: ${OMIM_API_KEY}
  ncbi_api_key: ${NCBI_API_KEY}
  cache_dir: data/cache/retrieval

function_calling:
  max_iterations: 5
  per_tool_timeout_s: 20
  truncate_tool_result_chars: 2000

self_consistency:
  n: 5
  temperatures: [0.3, 0.4, 0.5, 0.6, 0.7]

adapters:
  ncbi_tools:
    enabled: true
    class: NCBIToolsAdapter
    api_key: ${NCBI_API_KEY}
  clinical_calculators:
    enabled: true
    class: CalculatorAdapter
  phenoage:
    enabled: true
    class: PhenoAgeAdapter
  wearable:
    enabled: true
    class: WearableAdapter
